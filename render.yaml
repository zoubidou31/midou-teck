services:
  - type: web
    name: midou-teck-bot
    runtime: node
    plan: starter
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npx prisma db push && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgresql
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: DASHBOARD_URL
        sync: false
      - key: DASHBOARD_PORT
        value: "3000"
      - key: LOG_LEVEL
        value: info
      - key: STEAM_API_KEY
        sync: false
      - key: RAWG_API_KEY
        sync: false


